<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אתר המשחקים של לובה אליאב</title>
    <style>
        :root { --bg-color: #1a1a2e; --card-bg: #16213e; --accent-color: #e94560; --text-color: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden; }
        header { background-color: var(--card-bg); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { margin: 0; font-size: 22px; color: var(--accent-color); text-shadow: 0 0 10px rgba(233, 69, 96, 0.3); }
        .container { padding: 30px; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .game-card { background-color: var(--card-bg); border-radius: 12px; padding: 25px; text-align: center; box-shadow: 0 6px 15px rgba(0,0,0,0.3); transition: 0.3s; cursor: pointer; border: 2px solid transparent; }
        .game-card:hover { transform: translateY(-8px); border-color: var(--accent-color); box-shadow: 0 0 20px rgba(233, 69, 96, 0.4); }
        .game-icon { font-size: 50px; margin-bottom: 15px; display: block; }
        .game-title { font-size: 16px; font-weight: bold; line-height: 1.4; }
        .add-btn { position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background-color: var(--accent-color); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 35px; color: white; cursor: pointer; box-shadow: 0 0 20px rgba(233, 69, 96, 0.5); z-index: 100; transition: 0.3s; border: none; }
        .add-btn:hover { transform: scale(1.1) rotate(90deg); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--accent-color); }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; background: #0f3460; border: 1px solid #30475e; color: white; border-radius: 6px; box-sizing: border-box; text-align: center; }
        .file-label { display: block; background: #0f3460; padding: 12px; margin: 15px 0; border-radius: 6px; cursor: pointer; border: 1px dashed var(--accent-color); }
        .btn-action { background: var(--accent-color); color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        #gameViewer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; }
        #gameViewer iframe { width: 100%; height: 100%; border: none; }
        .close-game { position: fixed; top: 20px; left: 20px; width: 45px; height: 45px; background: rgba(233, 69, 96, 0.9); color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; z-index: 2100; border: none; font-family: Arial; font-weight: bold; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <h1>אתר המשחקים של לובה אליאב 🕹️</h1>
        <div id="userGreeting" style="font-weight: bold; color: var(--accent-color);"></div>
    </header>

    <div class="container">
        <div class="games-grid" id="gamesGrid"></div>
    </div>

    <button class="add-btn" id="openUploadModal" title="העלאת משחק חדש">+</button>

    <div id="uploadModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="color: var(--accent-color); margin-top: 0;">העלאת משחק חדש 🚀</h2>
            <input type="text" id="gameNameInput" placeholder="שם המשחק...">
            <label class="file-label" id="fileLabel">📁 בחר קובץ HTML</label>
            <input type="file" id="gameFileInput" accept=".html" style="display: none;">
            <button class="btn-action" id="btnUpload">שלח למאגר</button>
            <button onclick="document.getElementById('uploadModal').style.display='none'" style="background:none; border:none; color:gray; margin-top:15px; cursor:pointer;">ביטול</button>
            <div id="uploadStatus" style="margin-top:10px; font-size:13px; font-weight:bold;"></div>
        </div>
    </div>

    <div id="welcomeModal" class="modal-overlay" style="display: flex;">
        <div class="modal-content">
            <h2>ברוכים הבאים! 👋</h2>
            <p>איך קוראים לך?</p>
            <input type="text" id="usernameInput" placeholder="השם שלך..." autocomplete="off">
            <button class="btn-action" id="btnSaveName">כניסה</button>
        </div>
    </div>

    <div id="gameViewer">
        <button class="close-game" onclick="closeGame()">X</button>
        <iframe id="gameFrame" src=""></iframe>
    </div>

    <script type="module">
        console.log("%c🚀 Game HUB v2.6 - Logging Mode Initialized", "color: #e94560; font-weight: bold;");

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfAdF9WZiElVYW9ACS0RJhDASDeSz1zE8",
            authDomain: "regevlubaeliav.firebaseapp.com",
            projectId: "regevlubaeliav",
            storageBucket: "regevlubaeliav.firebasestorage.app",
            messagingSenderId: "944636597423",
            appId: "1:944636597423:web:2c176056d748429cb3305a",
            measurementId: "G-CW3FDZCGFZ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentUserName = "";
        let userIpAddress = "Unknown";
        const gameIcons = ["🕹️", "🎮", "🎲", "👾", "🎯", "🚀", "⚔️", "🏆", "🏃", "👑"];

        const uploadModal = document.getElementById('uploadModal');
        const openUploadBtn = document.getElementById('openUploadModal');
        const gameViewer = document.getElementById('gameViewer');
        const gameFrame = document.getElementById('gameFrame');

        openUploadBtn.onclick = () => uploadModal.style.display = 'flex';
        
        window.onclick = (event) => {
            if (event.target == uploadModal) uploadModal.style.display = "none";
        };

        // פונקציה אסינכרונית להבאת ה-IP של המשתמש בצורה בטוחה
        async function fetchUserIp() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIpAddress = data.ip;
                console.log("כתובת ה-IP של המשתמש אותרה:", userIpAddress);
            } catch (err) {
                console.error("לא ניתן היה לחלץ כתובת IP:", err);
            }
        }
        // מריצים את ה-IP fetch מיד בטעינת הדף
        fetchUserIp();

        // פונקציה גנרית לכתיבת לוגים למסד הנתונים
        async function logAction(actionName, extraData = {}) {
            try {
                await addDoc(collection(db, "logs"), {
                    username: currentUserName || "אורח",
                    ip: userIpAddress,
                    action: actionName,
                    timestamp: new Date(),
                    ...extraData
                });
                console.log(`[LOG SAVED]: ${actionName}`);
            } catch (err) {
                console.error("שגיאה ברישום הלוג:", err);
            }
        }

        // כניסת משתמש (תיעוד: חיבור)
        document.getElementById('btnSaveName').onclick = async () => {
            const name = document.getElementById('usernameInput').value.trim();
            if (!name) return alert("הכנס שם!");
            currentUserName = name;
            document.getElementById('userGreeting').innerText = `שלום, ${name} 👋`;
            document.getElementById('welcomeModal').style.display = 'none';
            
            // רישום לוג כניסה
            await logAction("התחברות לאתר");
            
            loadGames();
        };

        const fileInput = document.getElementById('gameFileInput');
        const fileLabel = document.getElementById('fileLabel');
        fileLabel.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                fileLabel.innerText = `נבחר: ${e.target.files[0].name}`;
                fileLabel.style.borderColor = "#28a745";
            }
        };

        // העלאת משחק (תיעוד: העלאת משחק + שם המשחק)
        document.getElementById('btnUpload').onclick = async () => {
            const name = document.getElementById('gameNameInput').value.trim();
            const file = fileInput.files[0];
            const status = document.getElementById('uploadStatus');

            if (!name || !file) return alert("מלא את כל הפרטים!");

            try {
                status.innerText = "מעלה משחק... ⏳";
                const reader = new FileReader();
                reader.readAsText(file);
                reader.onload = async (e) => {
                    await addDoc(collection(db, "games"), {
                        gameName: name,
                        uploadedBy: currentUserName,
                        gameHtml: e.target.result,
                        icon: gameIcons[Math.floor(Math.random() * gameIcons.length)],
                        createdAt: new Date()
                    });
                    
                    // רישום לוג העלאה
                    await logAction("העלאת משחק", { details: `העלה את המשחק: ${name}` });

                    status.innerText = "הצלחנו! 🎉";
                    setTimeout(() => { 
                        uploadModal.style.display = 'none'; 
                        status.innerText = "";
                        document.getElementById('gameNameInput').value = "";
                        fileLabel.innerText = "📁 בחר קובץ HTML";
                    }, 1500);
                    loadGames();
                };
            } catch (err) { console.error(err); status.innerText = "שגיאה!"; }
        };

        // טעינה
        async function loadGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = "טוען...";
            const q = query(collection(db, "games"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            grid.innerHTML = "";

            snap.forEach(doc => {
                const data = doc.data();
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `<span class="game-icon">${data.icon}</span><div class="game-title">${data.gameName}<br><small>מאת: ${data.uploadedBy}</small></div>`;
                
                // לחיצה על משחק (תיעוד: לחיצה על משחק + שם המשחק שנבחר)
                card.onclick = async () => {
                    await logAction("לחיצה על משחק", { details: `פתח את המשחק: ${data.gameName}` });
                    openGame(data.gameHtml);
                };
                
                grid.appendChild(card);
            });
        }

        function openGame(html) {
            gameViewer.style.display = 'block';
            document.body.style.overflow = 'hidden';
            const blob = new Blob([html], { type: 'text/html' });
            gameFrame.src = URL.createObjectURL(blob);
        }

        window.closeGame = function() {
            gameViewer.style.display = 'none';
            gameFrame.src = "";
            document.body.style.overflow = 'auto';
        };

    </script>
</body>
</html>
