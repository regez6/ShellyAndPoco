<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game HUB</title>
    <style>
        :root { --bg-color: #1a1a2e; --card-bg: #16213e; --accent-color: #e94560; --text-color: #ffffff; --text-secondary: #0f3460; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--card-bg); padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { margin: 0; font-size: 24px; color: var(--accent-color); }
        .user-greeting { font-size: 18px; font-weight: bold; }
        .controls { display: flex; gap: 10px; }
        button, .file-label { background-color: var(--accent-color); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: transform 0.2s, opacity 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        button:hover, .file-label:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-refresh { background-color: #0f3460; }
        .container { display: flex; flex: 1; padding: 20px; gap: 20px; }
        aside { flex: 1; max-width: 300px; background-color: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); height: fit-content; }
        aside h2 { margin-top: 0; color: var(--accent-color); font-size: 20px; border-bottom: 2px solid var(--bg-color); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 14px; }
        .form-group input[type="text"] { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #30475e; background-color: var(--bg-color); color: white; box-sizing: border-box; }
        .file-input-wrapper { position: relative; margin-bottom: 15px; }
        .file-input-wrapper input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
        main { flex: 3; }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .game-card { background-color: var(--card-bg); border-radius: 8px; padding: 20px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: transform 0.3s; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid transparent; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent-color); }
        .game-icon { font-size: 48px; margin-bottom: 15px; }
        .game-title { font-size: 16px; font-weight: bold; word-break: break-word; }
        #uploadStatus { margin-top: 10px; font-size: 14px; font-weight: bold; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .modal-content { background-color: var(--card-bg); padding: 40px; border-radius: 10px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.5); max-width: 400px; width: 90%; }
        .modal-content h2 { color: var(--accent-color); margin-top: 0; }
        .modal-content input { width: 100%; padding: 12px; margin: 20px 0; border-radius: 5px; border: 1px solid #30475e; background-color: var(--bg-color); color: white; font-size: 16px; box-sizing: border-box; text-align: center; }
    </style>
</head>
<body>

    <div id="welcomeModal" class="modal-overlay">
        <div class="modal-content">
            <h2>ברוכים הבאים ל-Game HUB! 🕹️</h2>
            <p>אנא הכנס את שמך כדי להמשיך ללוח המשחקים:</p>
            <input type="text" id="usernameInput" placeholder="השם שלך..." autocomplete="off">
            <button id="btnSaveName">כניסה לאתר</button>
        </div>
    </div>

    <header>
        <h1>Game HUB 🎮</h1>
        <div class="user-greeting" id="userGreeting">שלום, אורח</div>
        <div class="controls"><button class="btn-refresh" id="btnRefresh">🔄 סנכרן ורענן</button></div>
    </header>

    <div class="container">
        <aside>
            <h2>העלאת משחק חדש</h2>
            <div class="form-group">
                <label for="gameNameInput">שם המשחק:</label>
                <input type="text" id="gameNameInput" placeholder="לדוגמה: סנייק בחלל">
            </div>
            <div class="file-input-wrapper">
                <label class="file-label" id="fileLabel">📁 בחר קובץ HTML</label>
                <input type="file" id="gameFileInput" accept=".html">
            </div>
            <button id="btnUpload" style="width: 100%;">להעלות משחק 🚀</button>
            <div id="uploadStatus"></div>
        </aside>
        <main><div class="games-grid" id="gamesGrid"></div></main>
    </div>

    <script type="module">
        console.log("%c⚙️ הגרסה החדשה נטענה: v2.1 עם לוגים מורחבים", "color: #ff9f43; font-size: 14px; font-weight: bold;");

        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfAdF9WZiElVYW9ACS0RJhDASDeSz1zE8",
            authDomain: "regevlubaeliav.firebaseapp.com",
            projectId: "regevlubaeliav",
            storageBucket: "regevlubaeliav.firebasestorage.app",
            messagingSenderId: "944636597423",
            appId: "1:944636597423:web:2c176056d748429cb3305a",
            measurementId: "G-CW3FDZCGFZ"
        };

        console.log("מאתחל את Firebase...");
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        console.log("Firebase Database (Firestore) אותחל בהצלחה.");

        let currentUserName = "";
        const gameIcons = ["🕹️", "🎮", "🎲", "👾", "🎯", "🧩", "🚀", "⚔️", "🏆", "🏃", "👑", "🏴‍☠️"];

        const welcomeModal = document.getElementById('welcomeModal');
        const usernameInput = document.getElementById('usernameInput');
        const btnSaveName = document.getElementById('btnSaveName');
        const userGreeting = document.getElementById('userGreeting');
        const gamesGrid = document.getElementById('gamesGrid');
        const gameNameInput = document.getElementById('gameNameInput');
        const gameFileInput = document.getElementById('gameFileInput');
        const fileLabel = document.getElementById('fileLabel');
        const btnUpload = document.getElementById('btnUpload');
        const uploadStatus = document.getElementById('uploadStatus');
        const btnRefresh = document.getElementById('btnRefresh');

        btnSaveName.addEventListener('click', () => {
            const name = usernameInput.value.trim();
            if (name === "") { alert("בבקשה תרשום שם!"); return; }
            currentUserName = name;
            userGreeting.textContent = `שלום, ${currentUserName} 👋`;
            welcomeModal.style.display = 'none';
            console.log(`משתמש התחבר: ${currentUserName}. מתחיל לטעון משחקים...`);
            loadGames();
        });

        gameFileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                console.log(`קובץ נבחר בדפדפן: ${e.target.files[0].name} (${e.target.files[0].size} bytes)`);
                fileLabel.textContent = `נבחר: ${e.target.files[0].name}`;
                fileLabel.style.backgroundColor = "#28a745";
            }
        });

        const readFileAsText = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    console.log("קריאת הקובץ כטקסט הסתיימה בהצלחה.");
                    resolve(event.target.result);
                };
                reader.onerror = (error) => {
                    console.error("שגיאה בקריאת הקובץ:", error);
                    reject(error);
                };
                reader.readAsText(file);
            });
        };

        btnUpload.addEventListener('click', async () => {
            const gameName = gameNameInput.value.trim();
            const file = gameFileInput.files[0];

            console.log(`לחיצה על כפתור העלאה. שם משחק: "${gameName}", קובץ קיים: ${!!file}`);

            if (!gameName || !file) { alert("חובה להזין שם משחק ולבחור קובץ HTML!"); return; }

            try {
                btnUpload.disabled = true;
                uploadStatus.style.color = "orange";
                uploadStatus.textContent = "מעבד את קוד המשחק... ⏳";

                const gameCode = await readFileAsText(file);
                
                uploadStatus.textContent = "שומר בשרת... 🚀";
                console.log("%cמנסה לשלוח פקודת addDoc ל-Firestore...", "color: #00cfe8;");

                const randomIcon = gameIcons[Math.floor(Math.random() * gameIcons.length)];

                // שליחת המידע
                const docRef = await addDoc(collection(db, "games"), {
                    gameName: gameName,
                    uploadedBy: currentUserName,
                    gameHtml: gameCode, 
                    icon: randomIcon,
                    createdAt: new Date()
                });

                console.log(`%cהצלחה! המשחק נשמר ב-Firestore עם מזהה: ${docRef.id}`, "color: #28a745; font-weight: bold;");
                uploadStatus.style.color = "#28a745";
                uploadStatus.textContent = "המשחק הועלה בהצלחה! 🎉";
                
                gameNameInput.value = ""; gameFileInput.value = "";
                fileLabel.textContent = "📁 בחר קובץ HTML";
                fileLabel.style.backgroundColor = "var(--accent-color)";
                loadGames();

            } catch (error) {
                console.error("%cשגיאה חמורה בזמן השמירה בשרת המאגר:", "color: #ea5455; font-size: 14px; font-weight: bold;", error);
                uploadStatus.style.color = "#dc3545";
                uploadStatus.textContent = "תקלה בהעלאה. בדוק את השגיאה בקונסול (F12).";
            } finally {
                btnUpload.disabled = false;
            }
        });

        async function loadGames() {
            gamesGrid.innerHTML = "<p>טוען משחקים... תתכונן לשחק 🎮</p>";
            console.log("קורא את רשימת המשחקים מ-Firestore...");
            try {
                const q = query(collection(db, "games"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                gamesGrid.innerHTML = "";

                console.log(`נמצאו ${querySnapshot.size} משחקים במאגר.`);

                if (querySnapshot.empty) {
                    gamesGrid.innerHTML = "<p>אין עדיין משחקים ב-HUB. תהיה הראשון להעלות! 🚀</p>";
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const gameData = doc.data();
                    const gameCard = document.createElement('div');
                    gameCard.className = 'game-card';
                    
                    gameCard.addEventListener('click', () => {
                        console.log(`פתיחת משחק: ${gameData.gameName}`);
                        const newWindow = window.open();
                        if (newWindow) {
                            newWindow.document.open();
                            newWindow.document.write(gameData.gameHtml);
                            newWindow.document.close();
                        } else {
                            alert("אנא אפשר חלונות קופצים (Popups) בדפדפן!");
                        }
                    });

                    gameCard.innerHTML = `<div class="game-icon">${gameData.icon}</div><div class="game-title">${gameData.uploadedBy} - ${gameData.gameName}</div>`;
                    gamesGrid.appendChild(gameCard);
                });
            } catch (error) {
                console.error("שגיאה בטעינת משחקים מהמאגר:", error);
                gamesGrid.innerHTML = "<p style='color:#dc3545;'>שגיאה בטעינת המשחקים. ודא שהמאגר פתוח לקריאה.</p>";
            }
        }

        btnRefresh.addEventListener('click', loadGames);
    </script>
</body>
</html>
